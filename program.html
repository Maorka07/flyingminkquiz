<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת שיעור - Flying Mink</title>
    <style>
        :root {
            /* צבעים מותאמים אישית לפי אתר Flying Mink */
            --bg-color: #0f172a; /* כחול-כהה עמוק */
            --card-bg: #1e293b;
            --accent-color: #8b5cf6; /* סגול חי יותר */
            --heading-color: #e2e8f0; /* לבן אפרפר */
            --sub-color: #a78bfa; /* סגול בהיר לטקסט משני */
            --input-bg: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: var(--heading-color);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .form-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* כותרות ראשיות */
        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--heading-color);
            margin: 0 0 15px 0;
        }

        /* כותרות משנה */
        .subtitle {
            font-size: 15px;
            font-weight: 600;
            color: var(--sub-color);
            margin-bottom: 30px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--sub-color);
        }

        input, select {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <a href="https://flyingmink.com" class="btn-back">→ חזרה לאתר</a>
    </div>

    <div class="form-card">
        <span class="brand-name">Flying Mink</span>
        <h1>הזמנת שיעור אחד על אחד</h1>
        <p class="subtitle">הצעד הראשון שלך להפוך למטיס מקצועי</p>

        <form id="bookingForm">
            <div class="form-group">
                <label>שם מלא *</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>טלפון *</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label>רמת ניסיון *</label>
                <select id="experience" required>
                    <option value="" disabled selected>בחר רמה</option>
                    <option value="מתחיל">מתחיל (מאפס)</option>
                    <option value="בסיסי">ניסיון בסיסי</option>
                    <option value="מתקדם">מתקדם</option>
                </select>
            </div>
            <div class="form-group">
                <label>תאריך מבוקש *</label>
                <input type="date" id="date" required>
            </div>
            <button type="submit" class="submit-btn">שלח הודעת וואצאפ</button>
        </form>
    </div>

    <script>
        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const exp = document.getElementById('experience').value;
            const date = document.getElementById('date').value;
            
            const text = `שלום, אני מעוניין בשיעור אחד על אחד:\n*שם:* ${name}\n*טלפון:* ${phone}\n*ניסיון:* ${exp}\n*תאריך:* ${date}`;
            window.open(`https://wa.me/972549902676?text=${encodeURIComponent(text)}`, '_blank');
        };
    </script>
</body>
</html>
