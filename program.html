<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת שיעור - Flying Mink</title>
    <style>
        :root {
            --bg-color: #0a0e1a;
            --card-bg: #141b2d;
            --accent-color: #4a90e2;
            --text-color: #ffffff;
            --input-bg: #1f2940;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* כפתור חזרה */
        .back-nav {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .form-card {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* כותרת בשורה אחת */
        h1 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
            white-space: nowrap; /* מונע ירידת שורה */
            font-size: clamp(1.2rem, 6vw, 2.2rem); /* מתאים את הגודל לרוחב המסך */
            font-weight: 800;
        }

        p.subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="back-nav">
            <a href="https://flyingmink.com" class="btn-back">→ חזרה לאתר</a>
        </div>

        <div class="form-card">
            <h1>הזמנת שיעור אחד על אחד</h1>
            <p class="subtitle">הצעד הראשון שלך להפוך למטיס מקצועי</p>

            <form>
                <div class="form-group">
                    <label>שם מלא *</label>
                    <input type="text" placeholder="השם שלך" required>
                </div>

                <div class="form-group">
                    <label>טלפון *</label>
                    <input type="tel" placeholder="050-000-0000" required>
                </div>

                <div class="form-group">
                    <label>רמת ניסיון *</label>
                    <select required>
                        <option value="" disabled selected>בחר רמת ניסיון</option>
                        <option value="beginner">מתחיל (ללא ניסיון)</option>
                        <option value="intermediate">בינוני</option>
                        <option value="advanced">מתקדם</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>תאריך מבוקש *</label>
                    <input type="date" required>
                </div>

                <button type="submit" class="submit-btn">שליחת בקשה</button>
            </form>
        </div>
    </div>

</body>
</html>
