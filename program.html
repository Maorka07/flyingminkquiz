<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת שיעור - Flying Mink</title>
    <style>
        :root {
            /* צבע הבועה - כחול כהה עמוק מהתמונה */
            --card-bg: #111827; 
            /* רקע הדף - כהה ב-20% מהבועה (קרוב לשחור מוחלט) */
            --body-bg: #05070a; 
            /* סגול המותג */
            --accent-color: #a78bfa; 
            /* צבע כותרות */
            --text-heading: #e2e8f0;
            /* צבע טקסט משני */
            --text-sub: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--body-bg);
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* ניווט עליון סימטרי */
        header {
            width: 100%;
            max-width: 450px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-heading);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* לוגו הסמור */
        .mink-logo {
            width: 90px;
            height: auto;
            margin-bottom: 15px;
        }

        /* בועת ההזמנה - סימטרית ומדויקת */
        .form-bubble {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        /* כותרת בשורה אחת - חובה */
        h1 {
            color: var(--text-heading);
            font-size: clamp(1.2rem, 5vw, 1.7rem); /* מתאים את הגודל למסך */
            font-weight: 700;
            margin: 0 0 10px 0;
            white-space: nowrap; /* מונע ירידת שורה */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* שדות הטופס */
        .form-group {
            text-align: right;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
        }

        input, select {
            width: 100%;
            height: 48px; /* גובה אחיד לכולם */
            background-color: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 0 15px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        /* כפתור וואצאפ */
        .whatsapp-btn {
            width: 100%;
            height: 52px;
            background-color: var(--accent-color);
            color: #000; /* טקסט שחור על סגול נראה טוב יותר וברור */
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* התאמה לנייד */
        @media (max-width: 480px) {
            .form-bubble {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 10px;">
            <div style="width: 35px; height: 35px; border-radius: 50%; background: #1f2937; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);">👤</div>
            <div style="width: 35px; height: 35px; border-radius: 50%; background: #1f2937; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);">📸</div>
        </div>
        <a href="https://flyingmink.com" class="btn-back">חזרה לאתר ←</a>
    </header>

    <img src="https://flyingmink.com/mink-logo-silver.png" alt="Flying Mink Logo" class="mink-logo">

    <div class="form-bubble">
        <h1>הזמנת שיעור אחד על אחד</h1>
        <p class="subtitle">הצעד הראשון שלך להפוך למטיס מקצועי</p>

        <form id="bookingForm">
            <div class="form-group">
                <label>שם מלא *</label>
                <input type="text" id="name" placeholder="השם שלך" required>
            </div>

            <div class="form-group">
                <label>טלפון *</label>
                <input type="tel" id="phone" placeholder="050-000-0000" required>
            </div>

            <div class="form-group">
                <label>רמת ניסיון *</label>
                <select id="experience" required>
                    <option value="" disabled selected>בחר רמת ניסיון</option>
                    <option value="ללא ניסיון">ללא ניסיון (מתחיל מאפס)</option>
                    <option value="ניסיון בסיסי">ניסיון בסיסי</option>
                    <option value="מתקדם">מתקדם / מטיס קיים</option>
                </select>
            </div>

            <div class="form-group">
                <label>תאריך מבוקש *</label>
                <input type="date" id="date" required>
            </div>

            <button type="submit" class="whatsapp-btn">
                שליחת בקשה בוואצאפ 📱
            </button>
        </form>
    </div>

    <script>
        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const exp = document.getElementById('experience').value;
            const dateInput = document.getElementById('date').value;

            // המרת תאריך לפורמט ישראלי
            let formattedDate = dateInput;
            if (dateInput) {
                const parts = dateInput.split('-');
                formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
            }

            const message = `היי Flying Mink! 👋 אשמח לתאם שיעור אחד על אחד🚁\n\n` +
                            `*שם:* ${name}\n` +
                            `*טלפון:* ${phone}\n` +
                            `*ניסיון:* ${exp}\n` +
                            `*תאריך מבוקש:* ${formattedDate}`;

            const phoneNumber = "972549902676";
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
        };
    </script>

</body>
</html>
