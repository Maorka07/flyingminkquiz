<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנת שיעור - Flying Mink</title>
    <style>
        :root {
            --bg-color: #0a0e1a;
            --card-bg: #141b2d;
            --accent-color: #a78bfa; /* הסגול של האתר */
            --text-color: #ffffff;
            --input-bg: #1f2940;
            
            /* צבעים חדשים לפי בקשתך */
            --heading-color: #e2e8f0;
            --sub-color: #c4b5fd;
        }

        body {
            /* פונט מעודכן */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            z-index: 1000;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .form-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* כותרות ראשיות (לוגו, שאלות וכו') */
        .brand-name, h1 {
            color: var(--heading-color);
            font-weight: 700;
            display: block;
        }

        .brand-name {
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 12px 0;
            white-space: nowrap;
            font-size: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* כותרות משנה וטקסט דגש */
        p.subtitle, label {
            color: var(--sub-color);
            font-weight: 600;
        }

        p.subtitle {
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

            cursor: pointer;
