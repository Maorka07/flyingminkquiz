<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flying Mink — סדנאות רחפנים לבתי ספר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;--bg2:#111827;--bg3:#1A2332;
  --border:rgba(255,255,255,0.06);--border-h:rgba(255,255,255,0.15);
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#64748B;
  --blue:#38BDF8;--purple:#818CF8;--orange:#FB923C;--military:#4ADE80;--military-dark:#166534;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;line-height:1.7;}

/* TOP BAR */
.top-bar{position:fixed;top:0;right:0;left:0;z-index:90;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(11,17,32,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:500;text-decoration:none;font-family:inherit;transition:all 0.3s;}
.back-btn:hover{border-color:var(--border-h);color:var(--t1);}
.top-right{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(129,140,248,0.2);border:1.5px solid rgba(129,140,248,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;text-decoration:none;}
.icon-btn:hover{background:rgba(129,140,248,0.4);transform:scale(1.08);}
.icon-btn svg{width:18px;height:18px;}

/* HEADER */
.page-header{text-align:center;padding:80px 24px 24px;animation:fadeUp 0.6s ease;}
.page-header img{width:80px;margin-bottom:12px;filter:drop-shadow(0 4px 15px rgba(129,140,248,0.3));}
.page-header h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;margin-bottom:8px;}
.page-header h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.page-header p{color:var(--t2);font-size:15px;max-width:500px;margin:0 auto;line-height:1.7;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:8px;padding:24px 16px 32px;animation:fadeUp 0.6s ease 0.1s both;flex-wrap:wrap;}
.tab{font-family:inherit;font-size:15px;font-weight:500;padding:12px 28px;border-radius:50px;border:1.5px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all 0.35s;}
.tab:hover{border-color:var(--border-h);color:var(--t1);background:rgba(255,255,255,0.03);}
.tab.active{color:var(--bg);font-weight:600;border-color:transparent;transform:scale(1.04);}
.tab .tab-sub{display:block;font-size:11px;font-weight:300;opacity:0.7;margin-top:2px;}

/* CONTENT */
.content{max-width:900px;margin:0 auto;padding:0 20px 60px;}
.hero-card{text-align:center;padding:40px 28px;border-radius:20px;border:1px solid var(--border);margin-bottom:32px;position:relative;overflow:hidden;animation:fadeUp 0.5s ease;}
.hero-emoji{font-size:3rem;margin-bottom:12px;}
.hero-tagline{font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:500;line-height:1.6;max-width:600px;margin:0 auto 16px;}
.hero-proof{font-size:14px;color:var(--t2);max-width:520px;margin:0 auto;padding:14px 20px;border-radius:10px;background:rgba(255,255,255,0.03);border-right:3px solid;line-height:1.7;}

.section-block{margin-bottom:28px;}
.section-title{font-size:1.2rem;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-bar{width:4px;height:24px;border-radius:2px;flex-shrink:0;}

.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
@media(max-width:700px){.cards-grid{grid-template-columns:1fr;}}
.feature-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;transition:all 0.3s;}
.feature-card:hover{background:var(--bg3);border-color:var(--border-h);transform:translateY(-3px);}
.card-icon{font-size:1.6rem;margin-bottom:10px;}
.feature-card h4{font-size:1rem;font-weight:600;margin-bottom:6px;}
.feature-card p{font-size:13px;color:var(--t2);line-height:1.7;}

.benefits-list{display:flex;flex-direction:column;gap:10px;}
.benefit-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);transition:all 0.25s;}
.benefit-item:hover{background:var(--bg3);transform:translateX(-4px);}
.benefit-check{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--bg);font-weight:700;}
.benefit-text{font-size:14px;line-height:1.6;}

.pricing-row{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:32px;}
@media(max-width:700px){.pricing-row{grid-template-columns:1fr;}}
.pricing-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px 20px;text-align:center;transition:all 0.3s;border-top:3px solid;}
.pricing-card:hover{border-color:var(--border-h);transform:translateY(-3px);}
.pricing-card h4{font-size:1rem;font-weight:600;margin-bottom:6px;}
.pricing-card p{font-size:13px;color:var(--t2);line-height:1.6;}

.cta-block{text-align:center;padding:40px 28px;border-radius:18px;border:1px solid var(--border);margin-bottom:40px;position:relative;overflow:hidden;}
.cta-text{font-size:1.15rem;font-weight:500;line-height:1.7;max-width:560px;margin:0 auto 24px;}
.cta-button{font-family:inherit;font-size:1rem;font-weight:600;padding:14px 40px;border-radius:50px;border:none;cursor:pointer;transition:all 0.3s;letter-spacing:0.3px;text-decoration:none;display:inline-block;}
.cta-button:hover{transform:scale(1.05);filter:brightness(1.1);}

.footer{text-align:center;padding:24px;font-size:12px;color:var(--t3);border-top:1px solid var(--border);}

/* BOT */
.bot-fab{position:fixed;bottom:24px;left:24px;z-index:80;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6366f1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(129,140,248,0.4);transition:all 0.3s;animation:pulse 3s ease-in-out infinite;}
.bot-fab:hover{transform:scale(1.1);}
.bot-fab svg{width:26px;height:26px;color:#fff;}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(129,140,248,0.4);}50%{box-shadow:0 4px 30px rgba(129,140,248,0.6),0 0 0 8px rgba(129,140,248,0.1);}}

.bot-panel{position:fixed;bottom:92px;left:24px;z-index:80;width:340px;max-width:calc(100vw - 48px);max-height:65vh;background:var(--bg2);border:1px solid rgba(129,140,248,0.2);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:none;flex-direction:column;overflow:hidden;}
.bot-panel.open{display:flex;animation:slideUp 0.3s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.bot-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(129,140,248,0.15);}
.bot-hinfo{display:flex;align-items:center;gap:10px;}
.bot-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#6366f1);display:flex;align-items:center;justify-content:center;font-size:16px;}
.bot-htext h4{font-size:13px;font-weight:700;}.bot-htext p{font-size:10px;color:var(--t3);}
.bot-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;}
.bot-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:180px;max-height:300px;}
.msg{max-width:85%;padding:9px 13px;border-radius:14px;font-size:12px;line-height:1.6;}
.msg-bot{align-self:flex-start;background:rgba(129,140,248,0.12);border:1px solid rgba(129,140,248,0.2);color:var(--t1);}
.msg-user{align-self:flex-end;background:var(--purple);color:#fff;}
.bot-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(129,140,248,0.15);}
.bot-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(129,140,248,0.2);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--t1);font-family:inherit;outline:none;}
.bot-input::placeholder{color:var(--t3);}
.bot-send{background:var(--purple);border:none;border-radius:10px;padding:9px 14px;cursor:pointer;}
.bot-send svg{width:16px;height:16px;color:#fff;}
.qr{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.qr button{background:rgba(255,255,255,0.06);border:1px solid rgba(129,140,248,0.2);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--purple);cursor:pointer;font-family:inherit;transition:all 0.2s;}
.qr button:hover{background:rgba(129,140,248,0.15);}
</style>
</head>

function renderTab(idx){
  activeTab=idx;
  const s=SCHOOLS[idx];

  document.querySelectorAll('.tab').forEach((t,i)=>{
    if(i===idx){t.classList.add('active');t.style.background=c;t.style.borderColor=c;t.style.color='var(--bg)';}
    else{t.classList.remove('active');t.style.background='';t.style.borderColor='';t.style.color='';}
  });

  let html='';
  // Hero
  html+=`<div class="hero-card" style="background:linear-gradient(135deg,${c}10,transparent 60%);">
    <div class="hero-emoji">${s.emoji}</div>
    <div class="hero-tagline" style="color:${c}">${s.tagline}</div>
    ${s.proof?'<div class="hero-proof" style="border-color:'+c+'">'+s.proof+'</div>':''}
  </div>`;

  // Sections
  s.sections.forEach(sec=>{
    html+=`<div class="section-block"><h3 class="section-title" style="color:${c}"><span class="section-bar" style="background:${c}"></span>${sec.title}</h3>`;
    if(sec.cards){
      html+='<div class="cards-grid">';
      sec.cards.forEach(cd=>{
        html+=`<div class="feature-card"><div class="card-icon">${cd.i}</div><h4 style="color:${c}">${cd.h}</h4><p>${cd.t}</p></div>`;
      });
      html+='</div>';
    }
    if(sec.items){
      html+='<div class="benefits-list">';
      sec.items.forEach(it=>{
        html+=`<div class="benefit-item"><div class="benefit-check" style="background:${c}">✓</div><span class="benefit-text">${it}</span></div>`;
      });
      html+='</div>';
    }
    html+='</div>';
  });

  // Pricing
  html+=`<h3 class="section-title" style="color:${c}"><span class="section-bar" style="background:${c}"></span>אפשרויות</h3><div class="pricing-row">`;
  s.pricing.forEach(p=>{
    html+=`<div class="pricing-card" style="border-top-color:${c}"><h4 style="color:${c}">${p.n}</h4><p>${p.d}</p></div>`;
  });
  html+='</div>';

  // CTA
  html+=`<div class="cta-block" style="color:${c};background:linear-gradient(135deg,${c}08,${c}04);">
    <p class="cta-text">${s.cta}</p>
    <a href="https://wa.me/972549902676?text=${encodeURIComponent('היי מאור, אנחנו מעוניינים בסדנת רחפנים ל'+['יסודי','חטיבת ביניים','תיכון'][idx])}" target="_blank" class="cta-button" style="background:${c};color:var(--bg);">דברו איתנו</a>
  </div>`;

  document.getElementById('contentArea').innerHTML=html;
}
