<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flying Mink — מדריכים ותוכן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0b16;--bg2:#111827;--bg3:#1a2332;--purple:#6d28d9;--purple-l:#a78bfa;--purple-g:rgba(109,40,217,0.15);--border:rgba(139,92,246,0.2);--border-h:rgba(167,139,250,0.5);--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;--gold:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;line-height:1.7;}

.top-bar{position:fixed;top:0;right:0;left:0;z-index:90;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(10,11,22,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:500;text-decoration:none;font-family:inherit;transition:all 0.3s;}
.back-btn:hover{border-color:var(--border-h);color:var(--t1);}
.top-right{display:flex;gap:8px;}
.icon-btn{width:38px;height:38px;border-radius:50%;background:rgba(109,40,217,0.25);border:1.5px solid rgba(167,139,250,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;text-decoration:none;}
.icon-btn:hover{background:rgba(109,40,217,0.5);transform:scale(1.08);}
.icon-btn svg{width:18px;height:18px;}

.hero{text-align:center;padding:80px 24px 20px;background:radial-gradient(ellipse at 50% 20%,rgba(109,40,217,0.1),transparent 60%);}
.hero img{width:80px;margin-bottom:12px;filter:drop-shadow(0 4px 15px rgba(167,139,250,0.3));}
.hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin-bottom:8px;}
.hero h1 span{color:var(--purple-l);}
.hero p{color:var(--t2);font-size:15px;max-width:480px;margin:0 auto;}

.filter-bar{display:flex;justify-content:center;gap:8px;padding:20px 16px 28px;flex-wrap:wrap;}
.filter-btn{font-family:inherit;font-size:13px;font-weight:500;padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all 0.3s;}
.filter-btn:hover{border-color:var(--border-h);color:var(--t1);}
.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple);}

.main{max-width:900px;margin:0 auto;padding:0 20px 60px;}

.section-label{font-size:1.1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:10px;padding-top:8px;}
.section-label span{width:4px;height:20px;border-radius:2px;flex-shrink:0;}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:2rem;}
@media(max-width:768px){.cards{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.cards{grid-template-columns:1fr;}}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-align:center;cursor:pointer;transition:all 0.3s;text-decoration:none;color:var(--t1);display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden;}
.card:hover{border-color:var(--border-h);transform:translateY(-3px);box-shadow:0 8px 30px var(--purple-g);}
.card-icon{font-size:28px;transition:transform 0.3s;}
.card:hover .card-icon{transform:scale(1.15);}
.card-title{font-size:14px;font-weight:700;line-height:1.3;}
.card-desc{font-size:11px;color:var(--t3);line-height:1.5;}
.card-free{position:absolute;top:8px;left:8px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);color:#34d399;font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;}
.card-paid{position:absolute;top:8px;left:8px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);color:var(--gold);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;}
.card-star{position:absolute;top:8px;right:8px;font-size:16px;color:var(--gold);}
.card.locked{opacity:0.75;}
.card.locked:hover{opacity:1;}
.lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,11,22,0.4);border-radius:14px;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.card.locked:hover .lock-overlay{opacity:1;}
.lock-text{background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.3);color:var(--gold);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;}

.footer{text-align:center;padding:24px;font-size:12px;color:var(--t3);border-top:1px solid var(--border);}
</style>
</head>

  {id:"maintenance",icon:"",title:"תחזוקה ותיקונים",desc:"מה לבדוק לפני כל טיסה ומתי ללכת למעבדה",free:false,tags:["advanced","safety"]}
];

let currentFilter = 'all';

function filterCards(f){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(
      f==='all'?'הכל':f==='free'?'חינמי':f==='paid'?'בתשלום':f==='beginner'?'מתחילים':f==='advanced'?'מתקדמים':f==='photo'?'צילום':f==='safety'?'בטיחות':''
    ));
  });
  renderCards();
}

function renderCards(){
  const f = currentFilter;
  let filtered = GUIDES;
  if(f==='free') filtered = GUIDES.filter(g=>g.free);
  else if(f==='paid') filtered = GUIDES.filter(g=>!g.free);
  else if(f!=='all') filtered = GUIDES.filter(g=>g.tags.includes(f));

  const freeOnes = filtered.filter(g=>g.free);
  const paidOnes = filtered.filter(g=>!g.free);

  let html = '';

  if(freeOnes.length > 0 && f !== 'paid'){
    html += '<div class="section-label"><span style="background:#34d399"></span>תוכן חינמי</div>';
    html += '<div class="cards">';
    freeOnes.forEach(g => {
      html += '<a href="'+(g.link||'#')+'" class="card" data-id="'+g.id+'"'+(g.link?'':' onclick="alert(\'התוכן ייכתב בקרוב — הישארו מעודכנים!\')"')+'>';
      if(g.star) html += '<div class="card-star">*</div>';
      html += '<div class="card-free">חינמי</div>';
      if(g.icon) html += '<div class="card-icon">'+g.icon+'</div>';
      html += '<div class="card-title">'+g.title+'</div>';
      html += '<div class="card-desc">'+g.desc+'</div>';
      html += '</a>';
    });
    html += '</div>';
  }

  if(paidOnes.length > 0 && f !== 'free'){
    html += '<div class="section-label"><span style="background:var(--gold)"></span>תוכן בתשלום</div>';
    html += '<div class="cards">';
    paidOnes.forEach(g => {
      html += '<div class="card locked" onclick="alert(\'תוכן בתשלום — יהיה זמין בקרוב!\')">';
      html += '<div class="card-paid">בתשלום</div>';
      if(g.icon) html += '<div class="card-icon">'+g.icon+'</div>';
      html += '<div class="card-title">'+g.title+'</div>';
      html += '<div class="card-desc">'+g.desc+'</div>';
      html += '<div class="lock-overlay"><div class="lock-text">למנויים</div></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  if(filtered.length === 0){
    html = '<div style="text-align:center;padding:3rem;color:var(--t3);">אין תוכן בקטגוריה הזו עדיין</div>';
  }

  document.getElementById('mainContent').innerHTML = html;
}

renderCards();
</script>
</body>
</html>
