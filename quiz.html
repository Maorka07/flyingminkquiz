<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flying Mink — איזה רחפן מתאים לי?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f1e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow-x:hidden;}
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:480px;max-width:90vw;opacity:0.045;pointer-events:none;z-index:0;filter:invert(1) brightness(2);}
.container{background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:2rem;max-width:560px;width:100%;position:relative;z-index:1;backdrop-filter:blur(10px);box-shadow:0 0 60px rgba(109,40,217,0.15);}
.logo-top{display:flex;align-items:center;gap:12px;margin-bottom:.25rem;}
.logo-top img{width:48px;opacity:0.9;filter:invert(1) brightness(1.5);}
.logo-name{font-size:20px;font-weight:700;color:#e2e8f0;letter-spacing:1px;}
.logo-name span{color:#a78bfa;}
.sub{font-size:13px;color:#94a3b8;margin-bottom:2rem;margin-top:.25rem;}
.pb{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:2rem;}
.pf{height:3px;background:linear-gradient(90deg,#6d28d9,#a78bfa);border-radius:2px;transition:width 0.35s ease;}
.sl{font-size:12px;color:#64748b;margin-bottom:.4rem;letter-spacing:.3px;}
.qt{font-size:18px;font-weight:500;color:#e2e8f0;margin-bottom:1rem;line-height:1.5;}
.hint{font-size:13px;color:#64748b;margin-bottom:1rem;font-style:italic;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.2);border-radius:12px;padding:13px 16px;font-size:15px;color:#cbd5e1;cursor:pointer;text-align:right;transition:all .2s;font-family:inherit;line-height:1.4;width:100%;}
.opt:hover{border-color:#a78bfa;background:rgba(109,40,217,0.15);color:#e2e8f0;transform:translateX(-2px);}
.results{display:flex;flex-direction:column;gap:12px;}
.rc{background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.2);border-radius:14px;padding:1.25rem;}
.rc.first{border:1px solid #a78bfa;background:rgba(109,40,217,0.1);box-shadow:0 0 20px rgba(167,139,250,0.1);}
.medal-row{display:flex;align-items:center;gap:8px;margin-bottom:.5rem;}
.medal{font-size:20px;}.medal-label{font-size:12px;color:#94a3b8;}
.badge{display:inline-block;background:rgba(109,40,217,0.3);color:#c4b5fd;font-size:11px;padding:2px 10px;border-radius:6px;margin-bottom:.4rem;border:1px solid rgba(167,139,250,0.3);}
.fpv-badge{display:inline-block;background:rgba(79,70,229,0.3);color:#a5b4fc;font-size:11px;padding:2px 10px;border-radius:6px;margin-bottom:.4rem;border:1px solid rgba(165,180,252,0.3);}
.rname{font-size:17px;font-weight:600;color:#f1f5f9;margin-bottom:.3rem;}
.why{font-size:13px;color:#a78bfa;font-style:italic;margin-bottom:.5rem;}
.rdesc{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:.75rem;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem;}
.tag{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:2px 9px;font-size:12px;color:#64748b;}
.price-row{font-size:13px;color:#64748b;margin-bottom:.4rem;}
.warn{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 12px;font-size:12px;color:#fbbf24;margin-bottom:.5rem;}
.note{background:rgba(109,40,217,0.15);border:1px solid rgba(167,139,250,0.2);border-radius:8px;padding:8px 12px;font-size:12px;color:#c4b5fd;margin-top:.4rem;}
.buy-section{margin-top:1.5rem;background:rgba(255,255,255,0.03);border:1px solid rgba(139,92,246,0.15);border-radius:14px;padding:1rem 1.25rem;}
.buy-title{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:.75rem;}
.buy-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.buy-item:last-child{border-bottom:none;}
.buy-left{display:flex;align-items:center;gap:10px;font-size:14px;color:#cbd5e1;}
.buy-sub{font-size:12px;color:#475569;margin-top:1px;}
.buy-link{font-size:13px;color:#a78bfa;text-decoration:none;white-space:nowrap;}
.buy-link:hover{color:#c4b5fd;text-decoration:underline;}
.cta-box{margin-top:1.5rem;background:linear-gradient(135deg,rgba(109,40,217,0.35),rgba(79,70,229,0.35));border:1px solid rgba(167,139,250,0.4);border-radius:16px;padding:1.75rem;text-align:center;}
.cta-title{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:.5rem;line-height:1.4;}
.cta-btn{display:inline-block;background:linear-gradient(135deg,#6d28d9,#4f46e5);color:#fff;font-size:16px;font-weight:700;padding:13px 28px;border-radius:12px;text-decoration:none;letter-spacing:.3px;transition:all .2s;cursor:pointer;border:none;font-family:inherit;width:100%;}
.cta-btn:hover{background:linear-gradient(135deg,#7c3aed,#4338ca);transform:translateY(-1px);box-shadow:0 4px 20px rgba(109,40,217,0.4);}
.rst{display:block;width:100%;background:transparent;border:1px solid rgba(139,92,246,0.2);border-radius:12px;padding:11px;font-size:14px;color:#64748b;cursor:pointer;font-family:inherit;margin-top:1.25rem;transition:all .2s;}
.rst:hover{border-color:#a78bfa;color:#a78bfa;}
.footer{text-align:center;margin-top:1.5rem;font-size:12px;color:#334155;}

.back-btn{background:transparent;border:1px solid rgba(139,92,246,0.15);border-radius:10px;padding:9px 18px;font-size:13px;color:#64748b;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:1rem;display:inline-flex;align-items:center;gap:6px;}
.back-btn:hover{border-color:#a78bfa;color:#a78bfa;}
.drone-header{display:flex;align-items:center;gap:14px;margin-bottom:.3rem;}
.drone-img{width:90px;height:90px;object-fit:contain;border-radius:10px;background:rgba(255,255,255,0.06);padding:4px;flex-shrink:0;}
.drone-info{flex:1;min-width:0;}
.cta-input{background:rgba(255,255,255,0.08);border:1px solid rgba(167,139,250,0.3);border-radius:10px;padding:12px 16px;font-size:15px;color:#e2e8f0;font-family:inherit;text-align:right;outline:none;transition:border-color .2s;width:100%;margin-bottom:8px;}
.cta-input::placeholder{color:#64748b;}
.cta-input:focus{border-color:#a78bfa;}
.cta-success{color:#34d399;font-size:14px;font-weight:600;margin-top:.5rem;text-align:center;}
.admin-trigger{position:fixed;bottom:8px;left:8px;width:30px;height:30px;opacity:0;cursor:pointer;z-index:100;}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;}
.admin-overlay.show{display:flex;}
.admin-box{background:#1a1c2e;border:1px solid rgba(139,92,246,0.3);border-radius:16px;padding:2rem;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.admin-title{font-size:16px;font-weight:700;color:#e2e8f0;margin-bottom:1rem;}
.admin-stat{font-size:14px;color:#94a3b8;margin-bottom:.5rem;}
.admin-stat strong{color:#c4b5fd;}
.admin-close{background:#6d28d9;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:1rem;}
.admin-pass-wrap{display:flex;gap:8px;}
.admin-pass{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(139,92,246,0.3);border-radius:8px;padding:10px;font-size:14px;color:#e2e8f0;font-family:inherit;outline:none;}
.admin-pass::placeholder{color:#475569;}
.admin-unlock{background:#6d28d9;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;font-family:inherit;}
.lead-item{background:rgba(255,255,255,0.04);border:1px solid rgba(139,92,246,0.15);border-radius:8px;padding:10px;margin-bottom:8px;font-size:13px;color:#cbd5e1;}
.lead-item .lead-date{font-size:11px;color:#64748b;margin-top:4px;}
</style>
</head>

/* ─── Visit counter + leads storage ─── */
const ADMIN_PASS="FlyingMink0610!@";
const WA_NUMBER="972549902676";
let visitCount=0;let leads=[];
function loadStats(){try{const v=localStorage.getItem("fm_visits");visitCount=v?parseInt(v):0;const l=localStorage.getItem("fm_leads");leads=l?JSON.parse(l):[];}catch(e){visitCount=0;leads=[];}}
function saveVisit(){visitCount++;try{localStorage.setItem("fm_visits",visitCount);}catch(e){}}
function saveLead(n,p,d){const l={name:n,phone:p,drone:d,date:new Date().toLocaleString("he-IL")};leads.push(l);try{localStorage.setItem("fm_leads",JSON.stringify(leads));}catch(e){}}
loadStats();saveVisit();

let adminClicks=0,adminTimer=null;
function showAdminLogin(){const b=document.getElementById("adminBox");b.innerHTML='<div class="admin-title">🔒 כניסת מנהל</div><div class="admin-pass-wrap"><input type="password" class="admin-pass" id="adminPassInput" placeholder="סיסמה"><button class="admin-unlock" onclick="tryAdmin()">כניסה</button></div>';document.getElementById("adminOverlay").classList.add("show");}
function tryAdmin(){if(document.getElementById("adminPassInput").value===ADMIN_PASS){showAdminPanel();}else{alert("סיסמה שגויה");}}
function showAdminPanel(){const b=document.getElementById("adminBox");let lh="";if(leads.length===0){lh='<div style="color:#64748b;font-size:13px;">אין לידים עדיין</div>';}else{leads.slice().reverse().forEach(l=>{lh+='<div class="lead-item"><strong>'+l.name+'</strong> — '+l.phone+'<br>רחפן: '+l.drone+'<div class="lead-date">'+l.date+'</div></div>';});}b.innerHTML='<div class="admin-title">📊 פאנל מנהל</div><div class="admin-stat">כניסות לשאלון: <strong>'+visitCount+'</strong></div><div class="admin-stat">לידים: <strong>'+leads.length+'</strong></div><hr style="border:none;border-top:1px solid rgba(139,92,246,0.2);margin:1rem 0;"><div class="admin-title" style="font-size:14px;">לידים אחרונים</div>'+lh+'<button class="admin-close" onclick="document.getElementById(\'adminOverlay\').classList.remove(\'show\')">סגור</button>';}

  air65:{name:"BetaFPV AIR 65",badge:"Whoop קטן — זריז ומהנה",fpv:true,desc:"רחפן whoop קטן עם ביצועים גבוהים. קל לשליטה, מתאים לטיסה פנימית וחצר.",tags:["65mm","Whoop","DJI O3 תואם","1S-2S"],warn:null,note:null,price:"כ-300–500 ₪",zap:"BetaFPV+AIR+65",ksp:"BetaFPV+AIR+65"},
  air75:{name:"BetaFPV AIR 75",badge:"Whoop בינוני — כוח ושליטה",fpv:true,desc:"שדרוג על ה-AIR 65 — גדול יותר, חזק יותר, מתאים גם לחוץ. עם DJI O3.",tags:["75mm","Whoop","DJI O3","חוץ ופנים","2S-3S"],warn:null,note:null,price:"כ-500–800 ₪",zap:"BetaFPV+AIR+75",ksp:"BetaFPV+AIR+75"},
  pavo_pico:{name:"GEPRC Pavo Pico",badge:"הנמכר ביותר בקטגוריה",fpv:true,desc:"בנייה מהודקת, DJI O3 מובנה, תמונה מדהימה לגודלו.",tags:["Pico","DJI O3","בנייה איכותית","הכי פופולרי"],warn:null,note:null,price:"כ-400–650 ₪",zap:"GEPRC+Pavo+Pico",ksp:"GEPRC+Pavo+Pico"},
  pavo20:{name:"GEPRC Pavo 20 Pro",badge:"2 אינץ׳ — כוח אמיתי בגוף קטן",fpv:true,desc:"2 אינץ׳ עם DJI O3, מהיר יותר, עדיין קומפקטי. לטייסים שרוצים להתקדם מה-Whoop.",tags:["2 אינץ׳","DJI O3","3S-4S","חוץ ופנים"],warn:null,note:null,price:"כ-600–900 ₪",zap:"GEPRC+Pavo+20+Pro",ksp:"GEPRC+Pavo+20+Pro"},
  freestyle5:{name:"5\" Freestyle — בנייה עצמית (DJI O3/O4 + GoPro)",badge:"פריסטייל 5 אינץ׳ — בנה בעצמך",fpv:true,desc:"Frame, FC, ESC, מנועים, DJI O3/O4 Vista ו-GoPro. מותאם אישית, זול יותר, תלמד מה כל חלק עושה.",tags:["5 אינץ׳","DIY","DJI O3/O4","GoPro"],warn:"דורש ידע טכני בסיסי בסולדרינג.",note:"כדאי לצפות במדריך בניה ביוטיוב לפני שמתחילים.",price:"כ-1,000–2,000 ₪ לפי רכיבים",zap:"FPV+5+inch+freestyle",ksp:"FPV+5+inch"},

  matrice4:{name:"DJI Matrice 4 Pro",badge:"רמה תעשייתית",fpv:false,desc:"Payload גדול, RTK, תרמי, IP55. לארגונים שצריכים יכולת מקסימלית.",tags:["תעשייתי","RTK+תרמי","IP55","Payload"],warn:"לארגונים ויחידות מקצועיות בלבד.",note:null,price:"כ-35,000 ₪ ומעלה",zap:"DJI+Matrice+4+Pro",ksp:"DJI+Matrice+4+Pro"}

const WHY={neo:"קטן, זול וקל — נקודת כניסה אידיאלית",flip:"קומפקטי וללא רישיון — מחיר לאיכות מעולה",mini3_no:"הנמכר ביותר בישראל — אמינות מוכחת",mini3_screen:"Mini 3 Pro עם מסך נוח בשמש",mini4:"OA מכל כיוון ו-4K/100fps",mini5:"הדור הכי חדש — סנסור משודרג",air3:"סנסור 1 אינץ׳ ושתי עדשות",avata1:"FPV בתקציב — עדיין עובד מצוין",avata2:"ה-FPV הסינמטי המאוזן ביותר",mobula8:"הכי סלחני למתחילים — בטוח ללמידה",air65:"Whoop קטן עם אפשרות O3",pavo_pico:"הנמכר ביותר בקטגוריה — בנייה מהודקת",pavo20:"2 אינץ׳ — הצעד הבא מה-Whoop",air75:"Whoop בינוני עם DJI O3 לחוץ ופנים",freestyle5:"בנה בעצמך — מותאם אישית וזול יותר",mavic4:"הכי טוב לצילום — ללא פשרות",mavic3e:"RTK מדויק — הסטנדרט המקצועי",matrice4:"יכולת מקסימלית לכל משימה"};

const MEDALS=[{icon:"🥇",label:"הכי מתאים עבורך"},{icon:"🥈",label:"אלטרנטיבה טובה"},{icon:"🥉",label:"אפשרות נוספת"}];
const SMALL_BEGINNER=["mobula8","pavo_pico","air65"];
const SMALL_ADVANCED=["pavo20","air75","pavo_pico"];

function isFpvPath(ans){return (ans.use==="fun"||ans.use==="leisure")&&ans.fpv==="yes";}
function shouldAsk(id,ans){
  const fpv=isFpvPath(ans);
  if(id==="use") return true;
  if(id==="fpv") return ans.use==="fun"||ans.use==="leisure";
  if(id==="fpv_purpose") return fpv;
  if(id==="fpv_size") return fpv&&ans.fpv_purpose==="acro";
  if(id==="fpv_exp") return fpv&&ans.fpv_purpose==="acro"&&ans.fpv_size==="small";
  if(id==="budget") return !fpv;
  if(id==="exp") return !fpv&&(ans.use==="fun"||ans.use==="leisure");
  if(id==="screen") return !fpv&&(ans.use==="leisure"||ans.use==="fun")&&ans.fpv!=="yes";
  if(id==="thermal") return ans.use==="enterprise"||ans.use==="security";
  return false;
}
function recommend(ans){
  const {use,budget,exp,screen,thermal}=ans;
  if(use==="security"||use==="enterprise"){
    if(thermal==="security"||thermal==="enterprise") return "matrice4";
    return budget==="t7"?"matrice4":"mavic3e";
  }
  if(use==="commercial"){
    if(budget==="t7") return "mavic4";
    if(budget==="t6") return "air3";
    if(budget==="t5") return "mini5";
    if(budget==="t4") return screen==="yes"?"mini3_screen":"mini4";
    return "mini3_no";
  }
  if(budget==="t1") return "neo";
  if(budget==="t2") return "flip";
  if(budget==="t3") return screen==="yes"?"mini3_screen":"mini3_no";
  if(budget==="t4") return screen==="yes"?"mini3_screen":"mini4";
  if(budget==="t5") return "mini5";
  if(budget==="t6") return exp==="none"?"mini5":"air3";
  if(budget==="t7") return exp==="none"?"air3":"mavic4";
  return "mini5";
}
function getTop3(ans){
  const fpv=isFpvPath(ans);
  if(fpv){
    if(ans.fpv_purpose==="photo") return ["avata2","avata1","neo"];
    if(ans.fpv_purpose==="fun") return ["neo","avata1","avata2"];
    if(ans.fpv_purpose==="acro"){
      if(ans.fpv_size==="big") return ["freestyle5","pavo20","air75"];
      if(ans.fpv_size==="small") return ans.fpv_exp==="beginner"?SMALL_BEGINNER:SMALL_ADVANCED;
    }
  }
  const first=recommend(ans);
  const A={neo:["flip","avata1"],flip:["mini3_no","neo"],mini3_no:["flip","mini4"],mini3_screen:["mini3_no","mini4"],mini4:["mini3_screen","mini5"],mini5:["mini4","air3"],air3:["mini5","mavic4"],avata1:["neo","avata2"],avata2:["avata1","neo"],mavic4:["air3","mini5"],mavic3e:["matrice4"],matrice4:["mavic3e"]};
  return [first,...(A[first]||[]).slice(0,2)];
}

let answers={},asked=[];
function getFlow(){return Q.filter(q=>shouldAsk(q.id,answers));}
function getRemaining(){return getFlow().filter(q=>!asked.includes(q.id));}

function renderCard(id,rank){
  const d=D[id],m=MEDALS[rank];
  const b=d.fpv?`<div class="fpv-badge">${d.badge}</div>`:`<div class="badge">${d.badge}</div>`;
  const imgSrc=DRONE_IMG[id];
  const imgHtml=imgSrc?`<img class="drone-img" src="${imgSrc}" alt="${d.name}" onerror="this.style.display='none'">`:"";
  return `<div class="rc${rank===0?" first":""}">
    <div class="medal-row"><span class="medal">${m.icon}</span><span class="medal-label">${m.label}</span></div>
    ${b}
    <div class="drone-header">${imgHtml}<div class="drone-info"><div class="rname">${d.name}</div><div class="why">${WHY[id]}</div></div></div>
    <div class="rdesc">${d.desc}</div>
    ${d.warn?`<div class="warn">${d.warn}</div>`:""}
    <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    <div class="price-row">מחיר משוער: <strong style="color:#c4b5fd">${d.price}</strong></div>
    ${d.note?`<div class="note">${d.note}</div>`:""}
  </div>`;
}
function renderBuy(id){
  const d=D[id];
  return `<div class="buy-section">
    <div class="buy-title">איפה לקנות את ה-${d.name}?</div>
    <div class="buy-item"><div class="buy-left"><span>🔍</span><div><div>זאפ — השוואת מחירים</div><div class="buy-sub">כל החנויות במקום אחד</div></div></div><a class="buy-link" href="https://www.zap.co.il/search.aspx?keyword=${d.zap}" target="_blank">לחיפוש ←</a></div>
    <div class="buy-item"><div class="buy-left"><span>🖥️</span><div><div>KSP</div><div class="buy-sub">חנות אלקטרוניקה מובילה</div></div></div><a class="buy-link" href="https://ksp.co.il/web/search/${d.ksp}" target="_blank">לחיפוש ←</a></div>
    <div class="buy-item"><div class="buy-left"><span>🛒</span><div><div>Benda — הרצליה</div><div class="buy-sub">חנות פיזית מתמחה ברחפנים</div></div></div><a class="buy-link" href="https://www.benda.co.il/product-category/consumer/cameras-multimedia/drones-cameras-multimedia/" target="_blank">לאתר ←</a></div>
    <div class="buy-item"><div class="buy-left"><span>📱</span><div><div>Facebook Marketplace</div><div class="buy-sub">יד שנייה — לעתים מציאות</div></div></div><a class="buy-link" href="https://www.facebook.com/marketplace" target="_blank">לחיפוש ←</a></div>
  </div>
  <div class="cta-box" id="ctaBox">
    <div class="cta-title">רוצה ללמוד להטיס את הרחפן החדש שלך? 🚁</div>
    <div style="font-size:14px;color:#c4b5fd;margin-bottom:1.25rem;">השאר פרטים ומאור מ-Flying Mink יחזור אליך לתאם שיעור פרטי</div>
    <input class="cta-input" type="text" id="leadName" placeholder="שם מלא">
    <input class="cta-input" type="tel" id="leadPhone" placeholder="מספר טלפון" dir="ltr" style="text-align:left;">
    <button class="cta-btn" onclick="submitLead()">שליחה + יצירת קשר בוואטסאפ</button>
    <div id="ctaMsg"></div>
  </div>`;
}
function render(){
  const body=document.getElementById("body"),pf=document.getElementById("pf");
  const flow=getFlow(),remaining=getRemaining(),done=asked.length;
  pf.style.width=Math.round((done/Math.max(flow.length,1))*100)+"%";
  if(done>0&&remaining.length===0){
    pf.style.width="100%";
    const top3=getTop3(answers);
    body.innerHTML=`<div style="font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:1rem">הרחפנים המומלצים עבורך</div><div class="results">${top3.map((id,i)=>renderCard(id,i)).join("")}</div>${renderBuy(top3[0])}<button class="rst" onclick="restart()">התחל מחדש</button>`;
    return;
  }
  const q=remaining[0];
  const backBtn=done>0?`<button class="back-btn" onclick="goBack()">→ חזרה</button>`:"";
  body.innerHTML=`<div class="sl">שאלה ${done+1} מתוך ${flow.length}</div><div class="qt">${q.q}</div>${q.hint?`<div class="hint">${q.hint}</div>`:""}<div class="opts">${q.opts.map(o=>`<button class="opt" onclick="choose('${q.id}','${o.v}')">${o.t}</button>`).join("")}</div>${backBtn}`;
}
function choose(id,val){answers[id]=val;asked.push(id);render();}
function restart(){answers={};asked=[];render();}
function goBack(){
  if(asked.length===0)return;
  const lastId=asked.pop();
  delete answers[lastId];
  render();
}
function submitLead(){
  const name=document.getElementById("leadName").value.trim();
  const phone=document.getElementById("leadPhone").value.trim();
  const msg=document.getElementById("ctaMsg");
  if(!name||!phone){msg.innerHTML='<div style="color:#fbbf24;font-size:13px;margin-top:.5rem;">נא למלא שם וטלפון</div>';return;}
  const top3=getTop3(answers);
  const droneName=D[top3[0]]?D[top3[0]].name:"רחפן";
  saveLead(name,phone,droneName);
  msg.innerHTML='<div class="cta-success">✓ הפרטים נשמרו! מעביר לוואטסאפ...</div>';
  const waMsg=encodeURIComponent("היי מאור, אני "+name+" ואני מעוניין בשיעור טיסה. הרחפן שהומלץ לי: "+droneName+". הטלפון שלי: "+phone);
  setTimeout(()=>{window.open("https://wa.me/"+WA_NUMBER+"?text="+waMsg,"_blank");},800);
}
render();
</script>
